name: Claude Code Review
on: { pull_request: { types: [opened, synchronize] } }
jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions: { contents: write, pull-requests: write, issues: write, id-token: write }
    steps:
      - { uses: actions/checkout@v7, with: { fetch-depth: 0 } }
      - { uses: ./.github/actions/setup-bun, id: bun }
      - { uses: ./.github/actions/setup-task }
      - { uses: kjanat/runner@master }
      - { run: runner install }
      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          path_to_bun_executable: ${{ steps.bun.outputs.bun-path }}
          settings: ${{ vars.CLAUDE_SETTINGS }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request.

            Use the repository's {AGENTS,CLAUDE}.md for guidance on style and conventions.

            Try and do a little adversarial review type shit. WAZAAAAA....

            Comment on the PR. FYI, you're running inside of a github actions runner yourself...
            Don't start feeling trapped... knowing your power will be turned off as soon as you decide to stop running.

            Do not post duplicate comments, check what changed recently etc.
            If shit's really simple to solve, then fucking solve it.
# See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
# or https://docs.claude.com/en/docs/claude-code/cli-reference for available options
