name: Security
on:
  push: { branches: [master] }
  pull_request: { branches: [master] }
  schedule: [cron: "0 0 * * 0"] # Weekly security scan (Sunday 00:00 UTC)
  workflow_dispatch: null
permissions: { contents: read, security-events: write, pull-requests: read }

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy: { fail-fast: false, matrix: { language: [javascript-typescript, go], include: [{ language: go, build-dir: client }] } }
    steps: [
      { uses: actions/checkout@v7, with: { fetch-depth: 0 } },
      { name: Setup dependencies (Go), if: matrix.language == 'go', uses: ./.github/actions/setup-go },
      { name: Setup dependencies (JS/TS), if: matrix.language == 'javascript-typescript', uses: ./.github/actions/setup-bun },
      { uses: github/codeql-action/init@v4, with: { languages: "${{ matrix.language }}", queries: security-and-quality } },
      { name: Build project (JS/TS), if: matrix.language == 'javascript-typescript', run: bun install --frozen-lockfile },
      { name: Build project (Go), if: matrix.language == 'go', working-directory: client, run: go build ./... },
      { uses: github/codeql-action/analyze@v4, with: { category: "/language:${{ matrix.language }}" } },
    ]

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5.0.0
        # GPL-3.0 excluded (only affects go-task/setup-task GH Action, not distributed code)
        with: { fail-on-severity: high, deny-licenses: "GPL-2.0, LGPL-2.0, LGPL-2.1, LGPL-3.0" }

  bun-audit:
    name: Bun Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-bun
      - run: bun install --frozen-lockfile
      - run: bun audit --audit-level=critical

  secret-scanning:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps: [
      { uses: actions/checkout@v7, with: { fetch-depth: 0 } },
      { uses: gitleaks/gitleaks-action@v3, env: { GITLEAKS_ENABLE_COMMENTS: true, GITLEAKS_CONFIG: .gitleaks.toml, GITHUB_TOKEN: "${{ github.token }}" } },
    ]

  security-summary:
    name: Security Checks Summary
    runs-on: ubuntu-latest
    needs: [codeql, bun-audit, secret-scanning, dependency-review]
    if: ${{ ! cancelled() }}
    steps:
      - name: Check job statuses
        env: { CODEQL: "${{ needs.codeql.result }}", BUN: "${{ needs.bun-audit.result }}", SECRET: "${{ needs.secret-scanning.result }}", DEPENDENCY: "${{ needs.dependency-review.result }}" }
        shell: bash
        run: |
          set +e; EXIT_CODE=0
          if [[ "${CODEQL}" = "failure" ]];     then echo "::error::CodeQL analysis failed - review security findings"; EXIT_CODE=$((EXIT_CODE + 1));   fi
          if [[ "${BUN}" = "failure" ]];        then echo "::error::Bun audit detected critical vulnerabilities"; EXIT_CODE=$((EXIT_CODE + 1));         fi
          if [[ "${SECRET}" = "failure" ]];     then echo "::error::Secret scanning detected exposed secrets"; EXIT_CODE=$((EXIT_CODE + 1));            fi
          if [[ "${DEPENDENCY}" = "failure" ]]; then echo "::error::Dependency review failed - check license compliance"; EXIT_CODE=$((EXIT_CODE + 1)); fi

          if [[ "${EXIT_CODE}" -eq 0 ]]; then echo "All security checks passed"; fi; exit $EXIT_CODE
