# yaml-language-server: $schema=https://www.schemastore.org/dependabot-2.0.json
# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
---
version: 2
updates:
  - package-ecosystem: bun
    directory: /
    schedule: { interval: monthly }
    open-pull-requests-limit: 1
    allow: [dependency-type: direct]
    labels: [dependencies, javascript]
    commit-message: { prefix: chore(deps), include: scope }
    rebase-strategy: auto
    groups:
      production-minor-patch: { dependency-type: production, update-types: [minor, patch] }
      dev-dependencies: { dependency-type: development, update-types: [minor, patch] }

  - package-ecosystem: gomod
    directory: /client
    schedule: { interval: monthly }
    open-pull-requests-limit: 1
    allow: [dependency-type: direct]
    labels: [dependencies, go]
    commit-message: { prefix: chore(deps), include: scope }
    rebase-strategy: auto
    groups: { go-minor-patch: { update-types: [minor, patch] } }

  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: monthly }
    open-pull-requests-limit: 1
    labels: [dependencies, github-actions]
    commit-message: { prefix: ci, include: scope }
    rebase-strategy: auto
